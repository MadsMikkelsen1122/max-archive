<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synthetic Nature</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&display=swap" rel="stylesheet" />
    <link href="https://db.onlinewebfonts.com/c/2bf40ab72ea4897a3fd9b6e48b233a19?family=Garamond" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Geist", -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
        color: white;
        background: #010101;
      }
      .page { position: relative; height: 100vh; overflow: hidden; background: #010101; }
      video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center; }
      nav {
        position: relative; z-index: 20; display: flex; align-items: center; justify-content: center;
        gap: 64px; padding: 32px 32px;
      }
      .brand { color: #fff; text-transform: uppercase; letter-spacing: .3em; font-weight: 300; font-size: 16px; }
      .links { display: flex; gap: 36px; }
      .links a { color: rgba(255,255,255,.8); text-transform: uppercase; letter-spacing: .2em; font-size: 12px; font-weight: 300; transition: color .3s; }
      .links a:hover { color: white; }
      .hamburger { display: none; border: 0; background: transparent; color: white; width: 40px; height: 40px; font-size: 28px; }
      .mobile-menu {
        display: none; position: fixed; left: 16px; right: 16px; top: 64px; z-index: 50; flex-direction: column;
        align-items: center; gap: 20px; padding: 32px 0; border-radius: 16px; opacity: 0; transform: translateY(-10px);
        background: rgba(10,10,10,.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,.08);
        box-shadow: 0 8px 32px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.1);
        transition: opacity .3s ease, transform .3s ease;
      }
      .mobile-menu.open { display: flex; opacity: 1; transform: translateY(0); }
      .mobile-menu a { color: rgba(255,255,255,.9); text-transform: uppercase; letter-spacing: .25em; font-weight: 300; }
      .hero {
        position: relative; z-index: 10; height: calc(100vh - 96px); display: flex; flex-direction: column;
        align-items: center; justify-content: center; text-align: center; padding: 96px 20px 0;
      }
      h1 {
        font-family: "Garamond", "Times New Roman", serif; font-size: clamp(44px, 10vw, 128px);
        line-height: 1.08; font-weight: 400; letter-spacing: -0.03em; margin-bottom: 32px;
      }
      h1 span { display: block; }
      .char { display: inline-block; opacity: 0; transform: translateY(10px); animation: fadeChar .5s ease-out forwards; }
      .subtitle, .bio, .cta { opacity: 0; transform: translateY(20px); animation: fadeUp .8s ease forwards; }
      .subtitle {
        max-width: 448px; margin-bottom: 20px; color: rgba(255,255,255,.7); font-size: clamp(14px, 2vw, 18px);
        line-height: 1.7; font-weight: 300; animation-delay: 1.6s;
      }
      .bio {
        max-width: 460px; margin-bottom: 40px; color: rgba(255,255,255,.82); font-size: clamp(16px, 2vw, 21px);
        line-height: 1.85; font-weight: 600; animation-delay: 1.8s;
        font-family: "Noto Serif SC", "Songti SC", "SimSun", "Microsoft YaHei", serif;
      }
      .liquid-glass {
        background: rgba(255,255,255,.01); background-blend-mode: luminosity; backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px); border: none; box-shadow: inset 0 1px 1px rgba(255,255,255,.1);
        position: relative; overflow: hidden;
      }
      .liquid-glass::before {
        content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1.4px;
        background: linear-gradient(180deg, rgba(255,255,255,.45) 0%, rgba(255,255,255,.15) 20%, rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%, rgba(255,255,255,.15) 80%, rgba(255,255,255,.45) 100%);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
      }
      .liquid-glass:hover { background: rgba(255,255,255,.04); box-shadow: inset 0 1px 2px rgba(255,255,255,.15); }
      .liquid-glass:active { transform: scale(.98); }
      .cta {
        border-radius: 9999px; padding: 16px 40px; color: rgba(255,255,255,.9); text-transform: uppercase;
        letter-spacing: .2em; font-size: 12px; font-weight: 300; animation-delay: 2s;
      }
      @keyframes fadeChar { to { opacity: 1; transform: translateY(0); } }
      @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
      @media (max-width: 767px) {
        nav { justify-content: space-between; gap: 0; padding: 20px; }
        .brand { letter-spacing: .25em; font-size: 14px; }
        .links { display: none; }
        .hamburger { display: grid; place-items: center; }
        .hero { height: calc(100vh - 80px); padding-top: 48px; }
        h1 { margin-bottom: 24px; }
        .subtitle { max-width: 320px; margin-bottom: 18px; }
        .bio { max-width: 340px; font-size: 15px; margin-bottom: 32px; }
        .subtitle br { display: none; }
        .cta { padding: 14px 28px; letter-spacing: .18em; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <video autoplay muted loop playsinline src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260619_191346_9d19d66e-86a4-47f7-8dc6-712c1788c3b2.mp4"></video>
      <section class="hero">
        <h1>
          <span data-stagger="MAX‘s"></span>
          <span data-stagger="Archive"></span>
        </h1>
        <p class="bio">我有很多社交媒体，如果你想和我交友的话，请联系我。感谢观看<br>音符账号:19482948WPD</p>
      </section>
    </main>
    <script>
      document.querySelectorAll("[data-stagger]").forEach((node) => {
        const text = node.getAttribute("data-stagger");
        node.innerHTML = "";
        [...text].forEach((char, i) => {
          const span = document.createElement("span");
          span.className = "char";
          span.style.animationDelay = `${i * 0.07}s`;
          span.textContent = char === " " ? "\u00a0" : char;
          node.appendChild(span);
        });
      });
    </script>
  </body>
</html>
